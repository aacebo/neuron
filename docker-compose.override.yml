services:
  api:
    build:
      target: builder
    working_dir: /app
    volumes:
      - .:/app
      - api-target:/app/target
      - api-cargo-registry:/usr/local/cargo/registry
    command: cargo run --package api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  executor:
    build:
      target: builder
    working_dir: /app
    volumes:
      - .:/app
      - executor-target:/app/target
      - executor-cargo-registry:/usr/local/cargo/registry
    command: cargo run --package executor
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  api-target:
  executor-target:
  api-cargo-registry:
  executor-cargo-registry:
