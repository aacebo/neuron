services:
  api:
    build:
      target: builder
    working_dir: /app
    volumes:
      - .:/app
      - api-target:/app/target
      - api-cargo-registry:/usr/local/cargo/registry
    command: cargo run --package api

  executor:
    build:
      target: builder
    working_dir: /app
    environment:
      RUSTBERT_CACHE: /app/.cache
    volumes:
      - .:/app
      - executor-target:/app/target
      - executor-cargo-registry:/usr/local/cargo/registry
      - ./.cache:/app/.cache
    command: cargo run --package executor

volumes:
  api-target:
  executor-target:
  api-cargo-registry:
  executor-cargo-registry:
