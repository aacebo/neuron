{% extends "base.html" %}

{% block title %}Neuron Console{% endblock %}

{% block content %}
<style>
@keyframes indeterminate {
    0%   { transform: translateX(-100%) scaleX(0.5); }
    100% { transform: translateX(200%) scaleX(0.5); }
}
.animate-indeterminate {
    animation: indeterminate 1.4s ease-in-out infinite;
    width: 50%;
}
[x-cloak] { display: none !important; }
</style>

<script id="console-message" type="application/json">{{ message|json|safe }}</script>

<div class="max-w-4xl mx-auto px-6 py-10" x-data="neuronConsole()">

    <div class="mb-8">
        <h1 class="text-2xl font-bold text-white tracking-tight">Neuron Console</h1>
        <p class="text-gray-400 mt-1 text-sm">Run text through the NLP pipeline and inspect annotations and artifacts.</p>
    </div>

    <form @submit.prevent="submit()" class="space-y-4">
        <textarea
            x-model="text"
            rows="6"
            placeholder="Type or paste a message..."
            required
            class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none font-mono text-sm"
        ></textarea>

        <div class="flex items-center gap-4">
            <button
                type="submit"
                :disabled="loading"
                class="px-5 py-2 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium rounded-lg transition-colors"
            >
                Analyze
            </button>
            <span
                x-show="showElapsed"
                class="text-xs text-gray-500 font-mono"
            >
                elapsed: <span x-text="formatElapsed(elapsedMs)"></span>
            </span>
        </div>
    </form>

    <div x-show="loading" class="mt-6">
        <div class="w-full bg-gray-800 rounded-full h-1 overflow-hidden">
            <div class="h-1 bg-blue-500 rounded-full animate-indeterminate"></div>
        </div>
        <p class="text-gray-500 text-xs mt-2">Running pipeline…</p>
    </div>

    <div x-show="error" class="mt-6">
        <p class="text-red-400 text-sm" x-text="error"></p>
    </div>

    <div x-show="result" class="mt-10 space-y-8">

        <!-- Highlighted text view -->
        <div>
            <h2 class="text-xs font-semibold uppercase tracking-widest text-gray-500 mb-3">Text</h2>
            <div class="bg-gray-900 border border-gray-800 rounded-lg px-5 py-4 leading-relaxed text-sm font-mono max-h-80 overflow-y-auto">
                <template x-for="(seg, i) in segments" :key="i">
                    <span
                        :class="highlightClass(seg.type)"
                        :title="seg.type ? seg.type + ' · ' + seg.label + ' · ' + seg.score : ''"
                        x-text="seg.text"
                    ></span>
                </template>
            </div>
        </div>

        <!-- Two-column panels -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">

            <!-- Annotations -->
            <div>
                <h2 class="text-xs font-semibold uppercase tracking-widest text-gray-500 mb-3">Annotations</h2>
                <template x-if="result && result.annotations.length === 0">
                    <p class="text-gray-500 text-sm">None</p>
                </template>
                <div class="space-y-2 max-h-96 overflow-y-auto pr-2">
                    <template x-for="(grp, gi) in groupedAnnotations" :key="gi">
                        <div class="bg-gray-900 border border-gray-800 rounded-lg overflow-hidden">
                            <!-- Collapsed header: overlapping badges (stacked-avatar style) -->
                            <button
                                type="button"
                                @click="toggleGroup(grp.key)"
                                class="w-full flex items-center gap-3 px-4 py-3 text-sm text-left hover:bg-gray-800/40 transition-colors"
                            >
                                <!-- stacked type badges -->
                                <div class="shrink-0 flex flex-row-reverse justify-end">
                                    <template x-for="(ann, ai) in grp.items" :key="ai">
                                        <span
                                            class="text-xs font-medium px-2 py-0.5 rounded-full ring-2 ring-gray-900 -ml-2 first:ml-0"
                                            :class="badgeClass(ann.type)"
                                            :style="'z-index:' + (grp.items.length - ai)"
                                            :title="ann.type"
                                            x-text="ann.type"
                                        ></span>
                                    </template>
                                </div>
                                <span class="text-gray-200 truncate flex-1 min-w-0" x-text="grp.label"></span>
                                <template x-if="grp.start !== null">
                                    <span
                                        class="shrink-0 text-gray-600 text-xs font-mono"
                                        x-text="grp.start + '-' + grp.end"
                                    ></span>
                                </template>
                                <!-- chevron -->
                                <svg
                                    class="shrink-0 w-4 h-4 text-gray-500 transition-transform"
                                    :class="isExpanded(grp.key) ? 'rotate-180' : ''"
                                    viewBox="0 0 20 20" fill="currentColor"
                                >
                                    <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.17l3.71-3.94a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
                                </svg>
                            </button>

                            <!-- Expanded detail: indented label -> score list -->
                            <div x-show="isExpanded(grp.key)" x-cloak class="px-4 pb-3 pt-0 border-t border-gray-800/70">
                                <div class="space-y-1.5 pt-2 pl-3">
                                    <template x-for="(ann, ai) in grp.items" :key="ai">
                                        <div class="flex items-center gap-3">
                                            <span
                                                class="shrink-0 text-xs font-medium px-2 py-0.5 rounded-full"
                                                :class="badgeClass(ann.type)"
                                                x-text="ann.type"
                                            ></span>
                                            <span class="text-gray-300 truncate flex-1 min-w-0" x-text="ann.label"></span>
                                            <div class="shrink-0 flex items-center gap-2 w-24">
                                                <div class="flex-1 bg-gray-800 rounded-full h-1.5">
                                                    <div
                                                        class="bg-gray-400 h-1.5 rounded-full"
                                                        :style="'width:' + Math.round(ann.score * 100) + '%'"
                                                    ></div>
                                                </div>
                                                <span class="text-gray-500 text-xs w-8 text-right" x-text="ann.score.toFixed(2)"></span>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Artifacts -->
            <div>
                <h2 class="text-xs font-semibold uppercase tracking-widest text-gray-500 mb-3">Artifacts</h2>
                <template x-if="result && result.artifacts.length === 0">
                    <p class="text-gray-500 text-sm">None</p>
                </template>
                <div class="space-y-4 max-h-96 overflow-y-auto pr-2">
                    <template x-for="(art, i) in (result ? result.artifacts : [])" :key="i">
                        <div class="bg-gray-900 border border-gray-800 rounded-lg px-4 py-3 text-sm">
                            <template x-if="art.name === 'summary'">
                                <div>
                                    <div class="text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">Summary</div>
                                    <blockquote class="text-gray-300 leading-relaxed border-l-2 border-gray-700 pl-3 italic max-h-64 overflow-y-auto pr-2" x-text="art.content && art.content.text"></blockquote>
                                </div>
                            </template>
                            <template x-if="art.name === 'embedding'">
                                <div>
                                    <div class="text-xs font-semibold uppercase tracking-widest text-gray-500 mb-2">
                                        Embedding <span class="normal-case font-normal text-gray-600" x-text="art.embedding ? art.embedding.length + ' dims' : ''"></span>
                                    </div>
                                    <code
                                        class="block text-gray-400 font-mono text-xs break-all max-h-48 overflow-y-auto"
                                        x-text="art.embedding ? '[' + art.embedding.slice(0, 8).map(v => v.toFixed(3)).join(', ') + (art.embedding.length > 8 ? ', …' : '') + ']' : ''"
                                    ></code>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>

        </div>

        <!-- Metadata footer -->
        <div class="border-t border-gray-800 pt-4 flex flex-wrap gap-6 text-xs text-gray-600 font-mono">
            <span>id: <span x-text="result ? result.id : ''"></span></span>
            <span x-show="jobStatus(result)">status: <span x-text="jobStatus(result)"></span></span>
            <span>source: <span x-text="result ? result.source : ''"></span></span>
            <span>created: <span x-text="result ? result.created_at : ''"></span></span>
        </div>

    </div>

</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('neuronConsole', () => ({
        text: '',
        loading: false,
        result: null,
        error: null,
        eventSource: null,

        init() {
            const message = this.pageMessage();
            if (message) {
                this.applyResult(message);

                if (this.shouldWatch(message)) {
                    this.watchRun(message.id);
                }
            }
        },

        async submit() {
            this.closeEvents();
            this.loading = true;
            this.result = null;
            this.error = null;
            try {
                const res = await fetch('/chats/console/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: this.text }),
                });
                if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
                const message = await res.json();

                window.location.assign(`/console/${message.id}`);
            } catch (e) {
                this.error = e.message;
                this.loading = false;
            }
        },

        pageMessage() {
            const el = document.getElementById('console-message');
            if (!el) return null;

            try {
                return JSON.parse(el.textContent);
            } catch {
                return null;
            }
        },

        watchRun(messageId) {
            this.closeEvents();
            this.loading = true;

            const es = new EventSource(`/messages/${messageId}/events`);
            this.eventSource = es;

            es.onmessage = (e) => {
                try {
                    this.applyResult(JSON.parse(e.data));
                } catch {}
            };

            es.addEventListener('done', () => {
                this.closeEvents();
                this.loading = false;
            });

            es.onerror = () => {
                this.closeEvents();
                if (this.shouldWatch(this.result)) {
                    this.error = 'Connection lost';
                }
                this.loading = false;
            };
        },

        closeEvents() {
            if (this.eventSource) {
                this.eventSource.close();
                this.eventSource = null;
            }
        },

        applyResult(result) {
            this.result = result;
            this.text = result.text ?? '';

            const status = this.jobStatus(result);

            if (status === 'failure') {
                this.error = this.formatJobFailure(this.latestJob(result)?.error);
            } else if (status === 'cancelled') {
                this.error = 'Pipeline cancelled';
            } else {
                this.error = null;
            }

            this.loading = this.shouldWatch(result);
        },

        shouldWatch(result) {
            if (!result) return false;

            const jobs = result.jobs ?? [];
            return jobs.length === 0 || this.hasIncompleteJobs(result);
        },

        isTerminalStatus(status) {
            return ['success', 'failure', 'cancelled'].includes(status);
        },

        hasIncompleteJobs(result = this.result) {
            return (result?.jobs ?? []).some(job => !this.isTerminalStatus(job.status));
        },

        latestJob(result = this.result) {
            return result?.jobs?.[0] ?? null;
        },

        jobStatus(result = this.result) {
            return this.latestJob(result)?.status ?? null;
        },

        elapsedMsFor(result = this.result) {
            const job = this.latestJob(result);
            if (!job?.started_at || !job?.ended_at) return null;

            const ms = Date.parse(job.ended_at) - Date.parse(job.started_at);
            return Number.isFinite(ms) ? Math.max(0, ms) : null;
        },

        formatJobFailure(error) {
            if (!error) return 'Pipeline failed';
            if (typeof error === 'string') return `Pipeline failed: ${error}`;
            return `Pipeline failed: ${JSON.stringify(error)}`;
        },

        formatElapsed(ms) {
            return `${(ms / 1000).toFixed(2)}s`;
        },

        get elapsedMs() {
            return this.elapsedMsFor(this.result);
        },

        get showElapsed() {
            return this.result
                && this.isTerminalStatus(this.jobStatus(this.result))
                && Number.isFinite(this.elapsedMs);
        },

        get segments() {
            if (!this.result) return [];
            const text = this.result.text;
            const chars = Array.from(text);
            const anns = this.result.annotations ?? [];
            const priority = { pii: 0, entity: 1, keyword: 2 };
            const charAnn = new Array(chars.length).fill(null);

            const sorted = [...anns]
                .filter(a => a.type !== 'sentiment' && a.type in priority)
                .sort((a, b) => (priority[b.type] ?? 99) - (priority[a.type] ?? 99));

            for (const ann of sorted) {
                for (const span of ann.spans ?? []) {
                    const start = Math.max(0, Number(span.start) || 0);
                    const end = Math.min(chars.length, Math.max(start, Number(span.end) || start));
                    for (let i = start; i < end; i++) {
                        charAnn[i] = ann;
                    }
                }
            }

            const segs = [];
            let i = 0;
            while (i < chars.length) {
                const cur = charAnn[i];
                let j = i + 1;
                while (j < chars.length && charAnn[j] === cur) j++;
                segs.push({
                    text: chars.slice(i, j).join(''),
                    type: cur?.type ?? '',
                    label: cur?.label ?? '',
                    score: cur ? cur.score.toFixed(2) : '',
                });
                i = j;
            }
            return segs;
        },

        get groupedAnnotations() {
            if (!this.result) return [];
            const anns = this.result.annotations ?? [];
            const fullText = this.result.text ?? '';
            const chars = Array.from(fullText);
            const groups = new Map(); // key "start-end" -> { key, start, end, label, items: [] }

            for (const ann of anns) {
                const spans = (ann.spans && ann.spans.length) ? ann.spans : [null];
                for (const span of spans) {
                    const start = span ? Number(span.start) : null;
                    const end   = span ? Number(span.end)   : null;
                    const key = span ? `${start}-${end}` : `nospan-${groups.size}`;
                    if (!groups.has(key)) {
                        // Label for the collapsed row: the annotated text for this span.
                        const label = span
                            ? (chars.slice(start, end).join('') || ann.text || ann.label)
                            : (ann.text || ann.label);
                        groups.set(key, { key, start, end, label, items: [] });
                    }
                    groups.get(key).items.push(ann);
                }
            }

            const out = [...groups.values()];
            // stable order by span start, unspanned last
            out.sort((a, b) => {
                if (a.start === null) return 1;
                if (b.start === null) return -1;
                return a.start - b.start;
            });
            return out;
        },

        expandedGroups: {},

        toggleGroup(key) {
            this.expandedGroups[key] = !this.expandedGroups[key];
        },

        isExpanded(key) {
            return !!this.expandedGroups[key];
        },

        badgeClass(type) {
            return ({
                entity:    'bg-blue-900 text-blue-300',
                pii:       'bg-red-900 text-red-300',
                keyword:   'bg-yellow-900 text-yellow-300',
                sentiment: 'bg-green-900 text-green-300',
            })[type] ?? 'bg-gray-800 text-gray-400';
        },

        highlightClass(type) {
            return ({
                entity:  'bg-blue-900/60 text-blue-200 rounded px-0.5 cursor-default',
                pii:     'bg-red-900/60 text-red-200 rounded px-0.5 cursor-default',
                keyword: 'bg-yellow-900/60 text-yellow-200 rounded px-0.5 cursor-default',
            })[type] ?? '';
        },
    }));
});
</script>
{% endblock %}
